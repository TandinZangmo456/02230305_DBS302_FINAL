services:

  mongodb:
    image: mongo:7
    container_name: mongodb

    restart: always

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

    ports:
      - "27017:27017"

  redis:
    image: redis:7

    container_name: redis

    restart: always

    command: redis-server --appendonly yes

    ports:
      - "6379:6379"
